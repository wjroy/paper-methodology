# Map Agent Keywords Hint File
# 
# This is NOT a rigid dictionary but a hint list for common terms.
# The Map Agent can recognize keywords outside this list through open extraction.

# Level 1: Foundation Paradigms (high-level concepts)
foundation_paradigms:
  hints:
    - tsfm: ["foundation model", "time series foundation", "chronos", "timesfm", "moirai", "timegpt", "timer", "pre-trained time series"]
    - llm: ["large language model", "llm", "gpt", "bert", "llama", "transformer", "pre-trained language model"]
    - plm: ["pre-trained language model", "plm", "bert", "roberta", "t5"]
    - fm: ["foundation model", "fm", "pre-trained model", "large-scale model"]
    - physics_informed: ["physics-informed", "physics informed", "PINN", "physics-based", "mechanical model", "hybrid model"]
    - data_driven: ["data-driven", "data driven", "machine learning", "deep learning", "neural network", "AI model"]

# Level 2: Model Architectures (structural approaches)
model_architectures:
  hints:
    - gnn: ["graph neural network", "gnn", "gcn", "gat", "graph convolution", "graph attention", "geometric deep learning"]
    - gan: ["generative adversarial network", "gan", "cgan", "generator", "discriminator", "adversarial training"]
    - rnn: ["recurrent neural network", "rnn", "lstm", "gru", "sequential model"]
    - transformer: ["transformer", "attention mechanism", "self-attention", "multi-head attention"]
    - cnn: ["convolutional neural network", "cnn", "convolution", "kernel", "filter"]
    - hybrid: ["hybrid model", "ensemble", "multi-modal", "fusion", "combined approach"]

# Level 3: Specific Techniques (implementation methods)
techniques:
  hints:
    # Training & Optimization
    - lora: ["lora", "low-rank adaptation", "low rank", "parameter-efficient", "peft"]
    - prompt_tuning: ["prompt tuning", "soft prompt", "virtual token", "prefix tuning"]
    - adapter: ["adapter", "bottleneck adapter", "lightweight fine-tuning"]
    - finetuning: ["fine-tuning", "fine tuning", "full fine-tune", "fine-tune"]
    - zeroshot: ["zero-shot", "zero shot", "0-shot", "without fine-tuning"]
    - fewshot: ["few-shot", "few shot", "k-shot", "in-context learning", "icl"]
    
    # Graph Construction
    - graph_construction: ["graph construction", "adjacency matrix", "edge feature", "node feature", "graph topology"]
    - spatial_graph: ["spatial graph", "distance-based", "radius graph", "knn graph"]
    - temporal_graph: ["temporal graph", "dynamic graph", "time-evolving graph"]
    - heterogeneous_graph: ["heterogeneous graph", "multi-relational", "different node types"]
    
    # Data Processing
    - tokenization: ["tokenization", "tokenize", "tokenizer", "subword", "bpe"]
    - embedding: ["embedding", "vector representation", "latent space", "feature extraction"]
    - normalization: ["normalization", "standardization", "scaling", "batch norm", "layer norm"]
    - augmentation: ["augmentation", "data augmentation", "mixup", "cutmix", "synthetic data"]
    
    # Time Series Specific
    - channel_independent: ["channel independent", "ci", "univariate", "single-series"]
    - patch_embedding: ["patch embedding", "time series patch", "patching"]
    - revin: ["revin", "reversible instance normalization", "instance norm"]
    - decomposition: ["decomposition", "seasonal-trend", "stl decomposition"]
    
    # Physics & Risk
    - physics_loss: ["physics loss", "physics constraint", "governing equation", "pde constraint"]
    - risk_assessment: ["risk assessment", "risk evaluation", "safety assessment", "hazard analysis"]
    - uncertainty: ["uncertainty quantification", "uncertainty", "probabilistic", "prediction interval", "confidence interval"]
    - fahp: ["fahp", "fuzzy ahp", "analytic hierarchy process", "fuzzy logic"]
    - bayesian: ["bayesian", "bayes", "posterior", "prior", "mcmc", "variational inference"]

# Level 4: Application Domains (context)
application_domains:
  hints:
    - excavation: ["excavation", "foundation pit", "deep excavation", "基坑", "深基坑"]
    - tunnel: ["tunnel", "tunnelling", "shield tunnel", "盾构", "隧道"]
    - slope: ["slope", "landslide", "slope stability", "边坡"]
    - foundation: ["foundation", "pile", "ground improvement", "地基"]
    - pipeline: ["pipeline", "buried pipeline", "underground pipeline", "管线"]
    - building: ["building", "structure", "adjacent building", "建筑物"]
    - railway: ["railway", "track", "metro", "subway", "铁路", "地铁"]

# Level 5: Data Sources
data_sources:
  hints:
    - fem_simulation: ["fem", "finite element", "numerical simulation", "flac", "plaxis", "abaqus"]
    - field_monitoring: ["field monitoring", "in-situ monitoring", "sensor data", "monitoring data"]
    - bim: ["bim", "building information modeling", "digital model"]
    - survey: ["survey", "measurement", "geotechnical investigation"]
    - expert_knowledge: ["expert knowledge", "expert judgment", "domain knowledge"]

# Note: This is a HINT file, not a constraint file.
# The Map Agent should:
# 1. Use these hints for quick matching
# 2. BUT also recognize terms outside this list through open extraction
# 3. Ask clarifying questions when uncertain
