# PARAMETER-EFFICIENT FINE-TUNING (PEFT)
# =============================================================================

peft_methods:
  # --- PEFT Overview ---
  - cn: 参数高效微调
    en: parameter-efficient fine-tuning
    abbr: PEFT
    note: umbrella term for LoRA, adapter, prompt tuning, etc.
  
  # --- Low-Rank Adaptation (LoRA) ---
  - cn: 低秩适配
    en: Low-Rank Adaptation
    abbr: LoRA
    note: fine-tuning via low-rank decomposition of weight updates
  
  - cn: 低秩分解
    en: low-rank decomposition
    abbr: null
  
  - cn: 秩
    en: rank
    abbr: r
  
  - cn: 权重更新
    en: weight update
    abbr: ΔW
  
  - cn: 缩放因子
    en: scaling factor
    abbr: α
  
  # --- Adapter Methods ---
  - cn: 适配器
    en: adapter
    abbr: null
    note: small trainable modules inserted between frozen layers
  
  - cn: 瓶颈层
    en: bottleneck layer
    abbr: null
  
  - cn: 降维投影
    en: down-projection
    abbr: null
  
  - cn: 升维投影
    en: up-projection
    abbr: null
  
  # --- Prompt Tuning Methods ---
  - cn: 软提示微调
    en: soft prompt tuning / prompt tuning
    abbr: null
    note: learning continuous prompt embeddings
  
  - cn: 前缀微调
    en: prefix tuning
    abbr: null
    note: prepending trainable prefix vectors to each layer
  
  - cn: 视觉提示微调
    en: visual prompt tuning
    abbr: VPT
    note: for vision models
  
  - cn: 可学习提示
    en: learnable prompt / soft prompt
    abbr: null
  
  # --- General PEFT Terms ---
  - cn: 冻结主干网络
    en: frozen backbone
    abbr: null
    note: keeping pre-trained weights fixed during adaptation
  
